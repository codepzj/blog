announcement:
  layout: markdown
  title: 重要通知
  content: |
    网站域名已变更为[**haohanxinghe.com**](https://haohanxinghe.com)。从2024年11月起本站已不再开源，已经持有源码副本或fork的朋友请及时删除以防止被他人恶意搬运的情况继续发生。

