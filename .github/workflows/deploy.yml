name: deploy-hexo-blog
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # 确保子模块被检出
      # 更新子模块
      - name: Update submodules
        run: |
          git pull --recurse-submodules
          git submodule update --remote --recursive

      - name: Commit update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'Git bot'
          git config --global user.email 'bot@noreply.github.com'
          # 设置远程仓库的 URL，使用 GITHUB_TOKEN 进行身份验证
          git remote set-url origin https://github.com/codepzj/blog.git
          
          # 提交更新并推送
          git commit -am "Auto updated submodule references" && git push origin HEAD || echo "No changes to commit"

      # 安装nodejs
      - name: install nodejs
        uses: actions/setup-node@v3.4.1
        with:
          node-version: "20.12.0"

      # 使用pnpm包管理
      - name: use pnpm
        run: npm i -g pnpm && pnpm config set registry https://registry.npmmirror.com
        
      # 安装 hexo-cli
      - name: Cache Modules
        uses: actions/cache@v1
        id: cache-modules
        with:
          path: ~/.pnpm-store  # pnpm 的缓存目录
          key: ${{ runner.OS }}-${{ hashFiles('**/pnpm-lock.yaml') }}  # 使用 pnpm-lock.yaml 作为键

      # 安装依赖
      - name: Install Dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: |
          pnpm install --frozen-lockfile  # 使用 pnpm 安装依赖

      # 生成静态文件
      - name: Generate
        run: |
          hexo clean
          hexo generate 
          hexo deploy

      # 文件复制到服务器 
      - name: copy dist file with scp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PZJ_HOST }}
          username: ${{ secrets.PZJ_USERNAME }}
          password: ${{ secrets.PZJ_PASSWORD }}
          port: ${{ secrets.PZJ_PORT }}
          source: "public/"
          target: ${{ secrets.PZJ_TARGET }}