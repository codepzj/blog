name: status
on: 
  schedule:
    - cron: '0/5 * * * *'
  push:
    branches: 
      - main

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Download
      run: |
        export TZ='Asia/Shanghai'
        wget https://blog.codepzj.cn
        git clone -b status-page https://github.com/codepzj/blog.git ./status
        mv ./index.html ./status/`date +%Y_%m_%d_%H:%M:%S`.html
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: status-page
        publish_dir: ./status